<!DOCTYPE html>
<html lang="es">
<!-- === CABECERA DEL FORMULARIO === -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Producto | JOEL PIEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>

    <!-- === BARRA DE NAVEGACIÓN === -->
    <header class="admin-header">
        <a href="/admin" class="admin-logo">JOEL PIEL <span style="font-size: 12px; font-weight: 300;">ADMIN</span></a>
    </header>

    <!-- === CONTENEDOR PRINCIPAL DEL FORMULARIO === -->
    <div class="admin-container form-max-width">
        <!-- === ENLACE PARA VOLVER AL INVENTARIO === -->
        <div class="btn-back-container">
            <a href="{{ url_for('admin_productos') }}" class="btn-back-admin">
                <i class="fa-solid fa-arrow-left"></i> Volver al Inventario
            </a>
        </div>

        <h1 class="admin-title">Agregar Nuevo Bolso</h1>

        <!-- === MENSAJE DE ERROR === -->
        {% if error %}
        <div class="alert" style="background:#fdf2f2;border:1px solid #d9534f;color:#721c24;padding:12px;margin-bottom:20px;border-radius:2px;font-size:13px;">
            {{ error }}
        </div>
        {% endif %}

        <!-- === FORMULARIO DE CREACIÓN DE PRODUCTO === -->
        <div class="admin-card">
            <form action="{{ url_for('crear_producto') }}" method="POST" enctype="multipart/form-data">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <!-- === CAMPO: NOMBRE DEL BOLSO === -->
                <div class="form-group">
                    <label>Nombre del Bolso</label>
                    <input type="text" name="nombre" placeholder="Ej: Bolso Minimal" required>
                </div>

                <!-- === CAMPO: CATEGORÍA === -->
                <div class="form-group">
                    <label>Categoría</label>
                    <select name="id_categoria" style="width:100%; padding:12px 15px; border:1px solid #ddd; border-radius:2px; font-family:'Montserrat',sans-serif; font-size:14px; box-sizing:border-box; cursor:pointer; background:#fff;">
                        {% for cat in categorias %}
                        <option value="{{ cat.Id_categoria }}">{{ cat.nombre_categoria }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- === CAMPO: DESCRIPCIÓN === -->
                <div class="form-group">
                    <label>Descripción (opcional)</label>
                    <textarea name="descripcion" placeholder="Ej: Bolso con cierre magnético..." 
                        style="width:100%; padding:12px 15px; border:1px solid #ddd; border-radius:2px; font-family:'Montserrat',sans-serif; font-size:14px; box-sizing:border-box; resize:vertical; min-height:80px;"></textarea>
                </div>

                <!-- === CAMPOS: PRECIO Y STOCK EN FILA === -->
                <div class="form-row-flex">
                    <div class="form-group form-col-50">
                        <label>Precio ($)</label>
                        <input type="number" name="precio" placeholder="0" min="0" required>
                    </div>
                    <div class="form-group form-col-50">
                        <label>Stock Inicial</label>
                        <input type="number" name="stock" placeholder="0" min="0" required>
                    </div>
                </div>

                <!-- === CAMPO: IMAGEN (ARCHIVO O URL) === -->
                <div class="form-group">
                    <label>Imagen (subir archivo)</label>
                    <input type="file" name="imagen" accept="image/png,image/jpeg,image/jpg,image/gif,image/webp" style="width:100%;padding:8px;border:1px solid #ddd;">
                    <small style="color:#999; font-size:11px; margin-top:5px; display:block;">
                        <i class="fa-solid fa-circle-info"></i> O ingresa una URL manualmente:
                    </small>
                    <input type="text" name="imagen_url" placeholder="Ej: bolso_negro.jpg" style="margin-top:8px;">
                </div>

                <!-- === BOTÓN DE GUARDADO === -->
                <button type="submit" class="btn-save">
                    <i class="fa-solid fa-floppy-disk"></i> Guardar Producto
                </button>
            </form>
        </div>
    </div>

</body>
</html>

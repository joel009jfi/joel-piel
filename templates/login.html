<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | JOEL PIEL</title>
    <!-- Fuentes tipográficas -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>
<body class="auth-body">

    <!-- ===== FORMULARIO DE INICIO DE SESIÓN ===== -->
    <div class="auth-container">
        
        <h2 style="font-family: 'Playfair Display', serif; font-weight: 700; margin-bottom: 30px;">Iniciar Sesión</h2>

        <!-- Mensaje de alerta (error o información) -->
        {% if mensaje %}
        <div class="alerta" style="border-left: 4px solid #b19470; background-color: #faf6f0; color: #5c4d3c; padding: 12px; margin-bottom: 20px; text-align: left; font-size: 13px;">
            {{ mensaje }}
        </div>
        {% endif %}

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="email" name="email" class="auth-input" placeholder="Correo electrónico" required>
            
            <input type="password" name="password" class="auth-input" placeholder="Contraseña" required>

            <button type="submit" class="btn-auth" style="margin-top: 15px;">Ingresar a la cuenta</button>
        </form>

        <!-- Enlace al registro -->
        <p class="auth-switch" style="margin-top: 30px; font-size: 13px; color: #666;">
            ¿No tienes una cuenta aún? <br>
            <a href="{{ url_for('registro') }}" style="color: #000; font-weight: 600; text-decoration: underline; display: inline-block; margin-top: 5px;">Regístrate aquí</a>
        </p>

    </div>

</body>
</html>

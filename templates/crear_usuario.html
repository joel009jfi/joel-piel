<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Usuario | Panel Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .crear-user-wrap {
            max-width: 520px;
            margin: 40px auto;
            background: #fff;
            border-radius: 12px;
            padding: 40px 45px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.06);
        }
        .crear-user-wrap h1 {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            margin-bottom: 30px;
            text-align: center;
        }
        .crear-user-wrap label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            color: #555;
        }
        .crear-user-wrap input,
        .crear-user-wrap select {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            background: #fafafa;
            transition: border 0.2s, background 0.2s;
        }
        .crear-user-wrap input:focus,
        .crear-user-wrap select:focus {
            outline: none;
            border-color: #000;
            background: #fff;
        }
        .crear-user-wrap .btn-crear {
            width: 100%;
            padding: 14px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s;
        }
        .crear-user-wrap .btn-crear:hover {
            background: #222;
        }
        .crear-user-wrap .btn-volver {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #888;
            text-decoration: none;
        }
        .crear-user-wrap .btn-volver:hover {
            color: #000;
        }
        .crear-user-wrap .mensaje {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 13px;
            text-align: center;
        }
    </style>
</head>
<body>

    <header class="admin-header">
        <a href="{{ url_for('admin_panel') }}" class="admin-logo">JOEL PIEL <span style="font-size: 12px; font-weight: 300;">ADMIN</span></a>
        <nav class="admin-nav">
            <a href="{{ url_for('admin_usuarios') }}">Volver a Usuarios</a>
            <a href="{{ url_for('logout') }}" class="logout-btn">Salir</a>
        </nav>
    </header>

    <div class="crear-user-wrap">
        <h1>Nuevo Usuario</h1>

        {% if mensaje %}
        <div class="mensaje" style="background: {% if 'Error' in mensaje or 'registrado' in mensaje or 'obligatorios' in mensaje %}#f8d7da; color: #721c24{% else %}#d4edda; color: #155724{% endif %};">
            {{ mensaje }}
        </div>
        {% endif %}

        <form method="POST" autocomplete="off">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <label for="nombre">Nombre completo</label>
            <input type="text" id="nombre" name="nombre" placeholder="Ej: María García" autocomplete="off" required>

            <label for="email">Correo electrónico</label>
            <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" autocomplete="off" required>

            <label for="password">Contraseña de acceso</label>
            <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" required>

            <label for="rol">Rol</label>
            <select id="rol" name="rol">
                <option value="cliente">Cliente</option>
                <option value="admin">Administrador</option>
            </select>

            <button type="submit" class="btn-crear">Crear Usuario</button>
        </form>

        <a href="{{ url_for('admin_usuarios') }}" class="btn-volver">← Volver a la lista</a>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<!-- === CABECERA DE LA PÁGINA === -->
<head>
    <meta charset="UTF-8">
    <title>Gestión de Usuarios | JOEL PIEL</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- === BARRA DE NAVEGACIÓN === -->
    <header class="admin-header">
        <a href="/admin" class="admin-logo">JOEL PIEL <span style="font-size: 12px; font-weight: 300;">ADMIN</span></a>
        <nav class="admin-nav">
            <a href="/admin">Volver al Panel</a>
            <a href="/logout" class="logout-btn">Salir</a>
        </nav>
    </header>

    <!-- === CONTENEDOR PRINCIPAL === -->
    <div class="admin-container">
        <!-- === ENCABEZADO CON TÍTULO Y BOTÓN NUEVO USUARIO === -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 class="admin-title">Personas Registradas</h1>
            <a href="{{ url_for('registro') }}" style="background: #000; color: #fff; padding: 10px 20px; text-decoration: none; font-size: 12px; font-weight: bold;">+ NUEVO USUARIO</a>
        </div>

        <!-- === TABLA DE USUARIOS === -->
        <table class="admin-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Email</th>
                    <th>Rol</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for usuario in usuarios %}
                <tr>
                    <td>#{{ usuario.Id_usuario }}</td>
                    <td>{{ usuario.nombre }}</td>
                    <td>{{ usuario.email }}</td>
                    <td>
                        <span class="status-pill" style="background: {% if usuario.rol == 'admin' %}#000; color: #fff{% else %}#eee{% endif %};">
                            {{ usuario.rol|upper }}
                        </span>
                    </td>
                    <td>
                        <!-- === BOTÓN PARA CAMBIAR ROL DEL USUARIO === -->
                        <form action="{{ url_for('cambiar_rol_usuario', id_usuario=usuario.Id_usuario) }}" method="POST" style="display:inline;">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                            <button type="submit" style="background:none;border:none;color:#000;cursor:pointer;font-size:16px;margin-right:15px;" title="Cambiar rol"><i class="fa-solid fa-arrows-rotate"></i></button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Gestión de Usuarios | JOEL PIEL</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    
    <header class="admin-header">
        <a href="{{ url_for('admin_panel') }}" class="admin-logo">JOEL PIEL <span style="font-size: 12px; font-weight: 300;">ADMIN</span></a>
        <nav class="admin-nav">
            <a href="{{ url_for('admin_panel') }}">Volver al Panel</a>
            <a href="{{ url_for('logout') }}" class="logout-btn">Salir</a>
        </nav>
    </header>

    
    <div class="admin-container">
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 class="admin-title">Personas Registradas</h1>
            <a href="{{ url_for('admin_crear_usuario') }}" style="background: #000; color: #fff; padding: 10px 20px; text-decoration: none; font-size: 12px; font-weight: bold;">+ NUEVO USUARIO</a>
        </div>

        
        <table class="admin-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Email</th>
                    <th>Rol</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for usuario in usuarios %}
                <tr>
                    <td>#{{ usuario.Id_usuario }}</td>
                    <td>{{ usuario.nombre }}</td>
                    <td>{{ usuario.email }}</td>
                    <td>
                        <span class="status-pill" style="background: {% if usuario.rol == 'admin' %}#000; color: #fff{% else %}#eee{% endif %};">
                            {{ usuario.rol|upper }}
                        </span>
                    </td>
                    <td>
                        
                        <a href="{{ url_for('editar_usuario_admin', id_usuario=usuario.Id_usuario) }}" style="background:none;border:none;color:#000;cursor:pointer;font-size:16px;margin-right:15px;text-decoration:none;" title="Editar usuario"><i class="fa-solid fa-pen"></i></a>
                        
                        <a href="{{ url_for('eliminar_usuario_admin', id_usuario=usuario.Id_usuario) }}" style="background:none;border:none;color:#d9534f;cursor:pointer;font-size:16px;text-decoration:none;" title="Eliminar usuario" onclick="return confirm('¿Eliminar a {{ usuario.nombre }}? Esta acción no se puede deshacer.');"><i class="fa-solid fa-trash"></i></a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>

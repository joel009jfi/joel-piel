<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Usuario | JOEL PIEL</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    
    <header class="admin-header">
        <a href="{{ url_for('admin_panel') }}" class="admin-logo">JOEL PIEL <span style="font-size: 12px; font-weight: 300;">ADMIN</span></a>
        <nav class="admin-nav">
            <a href="{{ url_for('admin_usuarios') }}">Volver a Usuarios</a>
            <a href="{{ url_for('logout') }}" class="logout-btn">Salir</a>
        </nav>
    </header>

    
    <div class="admin-container" style="max-width: 500px;">
        <h1 class="admin-title" style="margin-bottom: 25px;">
            <i class="fa-solid fa-user-pen"></i> Editar Usuario
        </h1>

        <div class="admin-section" style="background:#fff;padding:30px;border:1px solid #eee;border-radius:4px;">
            <form method="POST" style="display:flex;flex-direction:column;gap:20px;">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                
                <div>
                    <label style="display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;color:#333;">
                        <i class="fa-solid fa-user"></i> Nombre
                    </label>
                    <input type="text" name="nombre" value="{{ usuario.nombre }}" required
                           style="width:100%;padding:12px 15px;border:1px solid #ddd;font-size:14px;font-family:Montserrat,sans-serif;box-sizing:border-box;border-radius:2px;">
                </div>

                
                <div>
                    <label style="display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;color:#333;">
                        <i class="fa-solid fa-envelope"></i> Email
                    </label>
                    <input type="email" name="email" value="{{ usuario.email }}" required
                           style="width:100%;padding:12px 15px;border:1px solid #ddd;font-size:14px;font-family:Montserrat,sans-serif;box-sizing:border-box;border-radius:2px;">
                </div>

                
                <div>
                    <label style="display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;color:#333;">
                        <i class="fa-solid fa-shield"></i> Rol
                    </label>
                    <select name="rol"
                            style="width:100%;padding:12px 15px;border:1px solid #ddd;font-size:14px;font-family:Montserrat,sans-serif;background:#fff;cursor:pointer;box-sizing:border-box;border-radius:2px;">
                        <option value="cliente" {% if usuario.rol == 'cliente' %}selected{% endif %}>Cliente</option>
                        <option value="admin" {% if usuario.rol == 'admin' %}selected{% endif %}>Administrador</option>
                    </select>
                </div>

                
                <div style="display:flex;gap:12px;margin-top:10px;">
                    <button type="submit"
                            style="flex:1;background:#000;color:#fff;border:none;padding:14px 20px;font-family:Montserrat,sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:2px;cursor:pointer;border-radius:2px;">
                        <i class="fa-solid fa-floppy-disk"></i> GUARDAR CAMBIOS
                    </button>
                    <a href="{{ url_for('admin_usuarios') }}"
                       style="flex:1;display:flex;align-items:center;justify-content:center;background:#f5f5f5;color:#333;border:1px solid #ddd;padding:14px 20px;font-family:Montserrat,sans-serif;font-size:12px;font-weight:600;text-decoration:none;border-radius:2px;">
                        CANCELAR
                    </a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<!-- === CABECERA DE LA PÁGINA === -->
<head>
    <meta charset="UTF-8">
    <title>Editar Usuario | JOEL PIEL</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>
    <!-- === CONTENEDOR DEL FORMULARIO DE EDICIÓN === -->
    <div class="admin-container" style="max-width: 500px; margin-top: 50px;">
        <h2 class="admin-title">Editar Usuario</h2>
        <!-- === FORMULARIO PARA ACTUALIZAR DATOS DEL USUARIO === -->
        <form method="POST" class="admin-section" style="display: flex; flex-direction: column; gap: 15px; background: #fff; padding: 20px; border: 1px solid #eee;">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <!-- === CAMPO: NOMBRE === -->
            <div>
                <label>Nombre:</label>
                <input type="text" name="nombre" value="{{ usuario.nombre }}" required style="width: 100%; padding: 10px; margin-top: 5px;">
            </div>
            <!-- === CAMPO: EMAIL === -->
            <div>
                <label>Email:</label>
                <input type="email" name="email" value="{{ usuario.email }}" required style="width: 100%; padding: 10px; margin-top: 5px;">
            </div>
            <!-- === CAMPO: ROL === -->
            <div>
                <label>Rol:</label>
                <select name="rol" style="width: 100%; padding: 10px; margin-top: 5px;">
                    <option value="cliente" {% if usuario.rol == 'cliente' %}selected{% endif %}>Cliente</option>
                    <option value="admin" {% if usuario.rol == 'admin' %}selected{% endif %}>Administrador</option>
                </select>
            </div>
            <!-- === BOTONES: ACTUALIZAR Y CANCELAR === -->
            <div style="margin-top: 10px;">
                <button type="submit" style="background: #000; color: #fff; border: none; padding: 10px 20px; cursor: pointer;">ACTUALIZAR</button>
                <a href="{{ url_for('admin_usuarios') }}" style="margin-left: 15px; color: #888; text-decoration: none;">Cancelar</a>
            </div>
        </form>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Categoría | JOEL PIEL</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="admin-header">
        <a href="/admin" class="admin-logo">JOEL PIEL <span style="font-size: 12px; font-weight: 300;">ADMIN</span></a>
        <nav class="admin-nav">
            <a href="/admin">Volver al Panel</a>
            <a href="/logout" class="logout-btn">Salir</a>
        </nav>
    </header>

    <div class="admin-container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 class="admin-title">Nueva Categoría</h1>
            <a href="{{ url_for('admin_categorias') }}" style="color:#888;text-decoration:none;font-size:13px;"><i class="fa-solid fa-arrow-left"></i> Volver</a>
        </div>

        {% if error %}
        <div style="padding:12px 18px;margin-bottom:18px;border-radius:4px;font-size:13px;background:#f8d7da;color:#721c24;">{{ error }}</div>
        {% endif %}

        <div class="admin-card" style="max-width:450px;">
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label>Nombre de la categoría</label>
                    <input type="text" name="nombre" placeholder="Ej: Accesorios" required>
                </div>
                <button type="submit" class="btn-save" style="margin-top:15px;">
                    <i class="fa-solid fa-floppy-disk"></i> Guardar Categoría
                </button>
            </form>
        </div>
    </div>
</body>
</html>
